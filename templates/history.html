<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>NPVA - Scan History</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <h1>Scan History</h1>
    <p><a href="/">← Back</a></p>

    {% if scans|length == 0 %}
      <p>No scans yet.</p>
    {% else %}
      <table border="1" cellpadding="6">
        <tr>
          <th>ID</th>
          <th>Target</th>
          <th>Started</th>
          <th>Finished</th>
          <th>Status</th>
          <th>View</th>
        </tr>
        {% for s in scans %}
        <tr>
          <td>{{ s.id }}</td>
          <td>{{ s.target }}</td>
          <td>{{ s.started_at }}</td>
          <td>{{ s.finished_at or "-" }}</td>
          <td>{{ s.status }}</td>
          <td><a href="/scan/{{ s.id }}">Open</a></td>
        </tr>
        {% endfor %}
      </table>
    {% endif %}
  </body>
</html>
